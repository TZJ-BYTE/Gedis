host: "0.0.0.0"
port: 16379
network_type: "gnet"

db_count: 16

max_memory: 268435456
max_memory_policy: "noeviction"

persistence_enabled: true
persistence_type: "lsm"
data_dir: "./data"
cold_start_strategy: "load_all"

block_size: 4096
memtable_size: 4194304
write_buffer_size: 67108864
max_open_files: 1000
bloom_filter_bits: 10

log_level: "info"
log_path: "./logs/redigo.log"

offload_enabled: false
offload_backend: "fs"
offload_endpoint: "127.0.0.1:9000"
offload_access_key: "minioadmin"
offload_secret_key: "minioadmin"
offload_bucket: "redigo-data"
offload_use_ssl: false
offload_region: "us-east-1"
offload_base_prefix: ""
offload_min_level: 2
offload_keep_local: true
offload_fs_root: "./offload"
